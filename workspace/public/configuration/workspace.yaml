
data:
  all:    
    selection:
      target: "typescript"

      default:
        targets:
          - all
          - root
          - project

      project:
        targets:
          - typescript
          - python


    script:
      types:
        - individual
        - collection

      targets:
        all-toolset-verify:
          type: "collection"
          commands:
            - typescript-toolset-verify    

        typescript-toolset-verify:
          enter-full-path: "{{ root-current-full-path }}/selection/typescript"
          type: "individual"
          commands:
            - "docker --version"
            - 'git --version'
            - 'gh --version'
            - 'node --version'
            - 'fnm --version'
            - 'npm --version'
            - 'bun --version'
            - 'bunx corepack --version'
            - 'bunx pnpm --version'
            - 'bunx yarn --version'

        all-test-unit:
          type: "collection"
          commands:
            - typescript-test-unit      

        typescript-test-unit:
          enter-full-path: "{{ root-current-full-path }}/selection/typescript"
          type: "individual"
          commands:
            - "bun run test:unit"


        all-test-benchmark:
          type: "collection"
          commands:
            - typescript-test-benchmark    

        typescript-test-benchmark:
          enter-full-path: "{{ root-current-full-path }}/selection/typescript"
          type: "individual"
          commands:
            - "bun run test:benchmark"


        all-codebase-format:
          type: "collection"
          commands:
            - typescript-codebase-format    

        typescript-codebase-format:
          enter-full-path: "{{ root-current-full-path }}/selection/typescript"
          type: "individual"
          commands:
            - "bun run format"


        all-codebase-lint:
          type: "collection"
          commands:
            - typescript-codebase-lint    

        typescript-codebase-lint:
          enter-full-path: "{{ root-current-full-path }}/selection/typescript"
          type: "individual"
          commands:
            - "bun run lint"


        all-project-build:
          type: "collection"
          commands:
            - typescript-project-build    

        typescript-project-build:
          enter-full-path: "{{ root-current-full-path }}/selection/typescript"
          type: "individual"
  # 
          commands:
            - "bun run build"


        all-project-setup:
          type: "collection"
          commands:
            - typescript-project-setup    

        typescript-project-setup:
          enter-full-path: "{{ root-current-full-path }}/selection/typescript"
          type: "individual"
          commands:
            - "bun install"


        all-project-update:
          type: "collection"
          commands:
            - typescript-project-update    

        typescript-project-update:
          enter-full-path: "{{ root-current-full-path }}/selection/typescript"
          type: "individual"
          commands:
            - "bun update"


        all-project-deploy:
          type: "collection"
          commands:
            - typescript-project-deploy    

        typescript-project-deploy:
          enter-full-path: "{{ root-current-full-path }}/selection/typescript"
          type: "individual"
          commands:
            - "bun run deploy"

    clean:
      exclude:
        targets:
          - "{{ root-current-full-path }}"
          - "{{ root-current-full-path }}/selection"
          - "{{ root-current-full-path }}/workspace"
          - "{{ root-current-full-path }}/github"  
          - "{{ root-current-full-path }}/.temporary"            

      include:
        targets:
          root-temporary:
            - "{{ root-current-full-path }}/workspace/private/temporary/log"
            - "{{ root-current-full-path }}/workspace/private/temporary/cache"

          typescript-temporary:
            - "{{ root-current-full-path }}/selection/typescript/output"


    macros:  
      value-cache:
        - root-current-full-path
        
      file:
        public-value: "{{ root-current-full-path }}/{{ private-value }}"


    full-path:
      root: "{{ root-current-full-path }}"
      typescript: "{{ root-current-full-path }}/selection/typescript"
      python: "{{ root-current-full-path }}/selection/python"

  root:

  project:    

metadata:

