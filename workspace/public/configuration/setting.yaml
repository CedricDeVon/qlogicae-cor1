all:
  workspace-projects:
    - typescript

root:
  verify-toolset:
    - name: docker
      command: docker --version

    - name: git
      command: git --version

    - name: github-cli
      command: gh --version

typescript:
  verify-toolset:
    - name: node
      command: node --version

    - name: fnm
      command: fnm --version

    - name: npm
      command: npm --version

    - name: bun
      command: bun --version

    - name: corepack
      command: bunx corepack --version

    - name: pnpm
      command: bunx pnpm --version

    - name: yarn
      command: bunx yarn --version
